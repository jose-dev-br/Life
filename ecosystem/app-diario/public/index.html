<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Jornada do Casal — Diário</title>
  <script src="/shared/api.js"></script>
  <script src="/shared/store.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    button, .qz-opcao, .qz-row { cursor: pointer; touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/diario/js/quiz.js"></script>
  <!--
    const { useState, useEffect, useCallback, useRef } = React;

    const PERGUNTAS = [
      { p: 'Se pudesse jantar em qualquer lugar do mundo, onde iriam?', o: ['🍕 Pizza em Nápoles', '🍣 Sushi no Japão', '🥘 Feijoada no Brasil', '🥐 Café em Paris'] },
      { p: 'Qual a melhor forma de passar um domingo juntos?', o: ['🏖️ Praia', '🏠 Descansar em casa', '🥾 Trilha na natureza', '🎮 Maratona de filmes'] },
      { p: 'Se vocês ganhassem uma viagem surpresa, qual seria?', o: ['🌴 Tropical', '🏔️ Montanha', '🗼 Cidade grande', '🚢 Cruzeiro'] },
      { p: 'Qual atividade vocês mais gostam de fazer juntos?', o: ['🍳 Cozinhar', '🎵 Ouvir música', '🚶 Caminhar', '📺 Assistir série'] },
      { p: 'Como vocês preferem comemorar aniversário?', o: ['🎉 Festa com amigos', '🍽️ Jantar romântico', '🎁 Surpresa em casa', '✈️ Viajar'] },
      { p: 'Se tivessem um dia livre sem planos, o que fariam?', o: ['🛋️ Série o dia todo', '🛒 Passeio no shopping', '🎶 Sair pra dançar', '📖 Ler juntos'] },
      { p: 'Qual o melhor presente que já deram um pro outro?', o: ['❤️ Algo feito à mão', '📷 Uma foto especial', '🎵 Uma música dedicada', '✨ Uma surpresa'] },
      { p: 'Se pudesse morar em qualquer cidade, qual seria?', o: ['🌊 Rio de Janeiro', '🏙️ São Paulo', '🌎 Lisboa', '🏔️ Curitiba'] },
      { p: 'Qual o melhor jeito de chegar em casa depois do trabalho?', o: ['🤗 Um abraço demorado', '🍽️ Jantar juntos', '🛋️ Descansar no sofá', '📱 Contar o dia'] },
      { p: 'Se vocês fossem um casal de filme, qual seria o gênero?', o: ['😂 Comédia romântica', '🎬 Drama épico', ' adventure Aventura', '✨ Fantasia'] },
    ];

    function QuizCasalMock() {
      const [entrou, setEntrou] = useState(false);
      const [etapa, setEtapa] = useState('responder');
      const [minhaResposta, setMinhaResposta] = useState(null);
      const [historicoExpandido, setHistoricoExpandido] = useState(false);
      const [quiz, setQuiz] = useState(null);
      const [historico, setHistorico] = useState([]);
      const [sincronizando, setSincronizando] = useState(false);
      const [erro, setErro] = useState(null);
      const auth = LifeStore.getAuth();
      const user = auth.user || '';
      const carregandoRef = useRef(false);

      const carregar = useCallback(async () => {
        if (carregandoRef.current) return;
        carregandoRef.current = true;
        setErro(null);
        try {
          const [q, h] = await Promise.all([LifeAPI.diary.todayQuiz(), LifeAPI.diary.historyQuiz()]);
          if (q.ok) setQuiz(q.quiz);
          if (h.ok) setHistorico(h.quizzes || []);
          if (q.ok && q.quiz) {
            if (q.quiz.answers[user]) setEtapa('respondido');
            else setEtapa('responder');
          }
        } catch (e) {
          setErro(e.message || 'Erro ao carregar dados');
        } finally {
          carregandoRef.current = false;
        }
      }, [user]);

      useEffect(() => {
        if (!LifeStore.getAuth().token) {
          window.location.href = '/';
          return;
        }
        const t = setTimeout(() => setEntrou(true), 60);
        carregar();
        return () => clearTimeout(t);
      }, [carregar]);

      async function criarQuiz() {
        setSincronizando(true);
        setErro(null);
        try {
          const pick = PERGUNTAS[Math.floor(Math.random() * PERGUNTAS.length)];
          const r = await LifeAPI.diary.createQuiz({
            pergunta: pick.p,
            opcoes: pick.o.map((t, i) => ({
              id: String.fromCharCode(97 + i),
              emoji: t.split(' ')[0],
              texto: t.split(' ').slice(1).join(' ')
            })),
          });
          if (!r.ok) {
            setErro(r.error || 'Erro ao criar quiz');
            return;
          }
          await carregar();
        } catch (e) {
          setErro(e.message || 'Erro de conexão');
        } finally {
          setSincronizando(false);
        }
      }

      function escolherResposta(id) {
        setMinhaResposta(id);
        setEtapa('prever');
      }

      function handleTap(fn) {
        return (event) => {
          event.preventDefault();
          fn();
        };
      }

      async function escolherPrevisao(id) {
        if (!quiz || !minhaResposta) return;
        setSincronizando(true);
        setErro(null);
        try {
          const r = await LifeAPI.diary.answerQuiz({ question_id: quiz.id, resposta: minhaResposta, previsao: id });
          if (!r.ok) {
            setErro(r.error || 'Erro ao salvar');
            return;
          }
          setEtapa('respondido');
          await carregar();
        } catch (e) {
          setErro(e.message || 'Erro de conexão');
        } finally {
          setSincronizando(false);
        }
      }

      const sintoniaGeral = historico.length > 0
        ? Math.round((historico.filter(h => h.bateu).length / historico.length) * 100)
        : 0;
      const opcaoPorId = (id) => quiz?.opcoes?.find(o => o.id === id);
      const ambos = quiz?.answers && Object.keys(quiz.answers).length >= 2;
      const userNames = ambos ? Object.keys(quiz.answers) : [];
      const otherUser = userNames.find(n => n !== user) || userNames[0];
      const otherAnswer = quiz?.answers?.[otherUser]?.resposta;
      const myAnswer = quiz?.answers?.[user]?.resposta;
      const bateu = ambos && myAnswer === otherAnswer;

      return (
        <div style={styles.page}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,500..700&family=JetBrains+Mono:wght@500;700&display=swap');
            * { box-sizing: border-box; }
            body { margin: 0; background: #faf1ee; }
            .qz-root { font-family: 'Nunito', sans-serif; }
            .qz-serif { font-family: 'Fraunces', serif; }
            .qz-mono { font-family: 'JetBrains Mono', monospace; }
            @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
            @keyframes fadeSlideIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
            @keyframes pulseDots { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
            @keyframes matchPop { 0%{transform:scale(0);} 60%{transform:scale(1.2);} 100%{transform:scale(1);} }
            @keyframes fillBar { from{width:0%;} }
            @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; } }
            .qz-card { background:#fffdfc; border-radius:20px; border:1.5px solid #f0ddd6; box-shadow:0 2px 12px rgba(180,120,110,0.07); padding:16px; }
            .qz-spotlight { position:relative; overflow:hidden; padding:22px; border-radius:24px; }
            .qz-spotlight::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 45%, transparent 60%); background-size:200% 100%; animation:shimmer 3.2s ease-in-out infinite; }
            .qz-opcao { display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:16px; margin-top:10px; background:rgba(255,255,255,0.16); border:1.5px solid rgba(255,255,255,0.3); cursor:pointer; color:white; transition:background .15s ease; width:100%; text-align:left; font-family:inherit; font-size:inherit; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; -webkit-user-select:none; min-height:48px; }
            .qz-opcao:active { background:rgba(255,255,255,0.3); transform:scale(0.98); }
            .qz-opcao:first-of-type { margin-top:16px; }
            .qz-dots span { animation:pulseDots 1.2s ease-in-out infinite; display:inline-block; }
            .qz-dots span:nth-child(2) { animation-delay:.2s; }
            .qz-dots span:nth-child(3) { animation-delay:.4s; }
            .qz-reveal-row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
            .qz-reveal-card { flex:1; min-width:100px; border-radius:16px; padding:14px; text-align:center; background:rgba(255,255,255,0.16); }
            .qz-match-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; font-weight:800; font-size:13px; animation:matchPop .4s ease; }
            .qz-bar-track { background:#f5e6e1; border-radius:999px; overflow:hidden; height:8px; }
            .qz-bar-fill { height:100%; border-radius:999px; animation:fillBar .9s cubic-bezier(.2,.8,.2,1); }
            .qz-row { display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid #f5e6e1; cursor:pointer; width:100%; background:none; border-left:none; border-right:none; border-top:none; font-family:inherit; font-size:inherit; color:inherit; text-align:left; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
            .qz-row:last-child { border-bottom:none; }
            .qz-row:active { background:rgba(0,0,0,0.03); transform:scale(0.98); }
            .qz-back { font-size:13px; color:#a8938e; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:4px; text-decoration:none; padding:8px 0; background:none; border:none; font-family:inherit; -webkit-tap-highlight-color:transparent; }
            .qz-toggle { border:none; background:none; font-family:inherit; font-size:13.5px; font-weight:800; color:#4a3634; cursor:pointer; display:flex; justify-content:space-between; align-items:center; width:100%; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
            .qz-toggle:active { opacity:0.6; }
            .qz-toggle-sub { font-size:12.5px; color:#a8544a; font-weight:700; }
            .qz-erro { background:#fde8e8; color:#c0392b; padding:10px 14px; border-radius:12px; font-size:13px; border:1px solid #f5c6c6; }
            .qz-btn { background:#a8544a; border:none; color:white; width:100%; padding:12px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
            .qz-btn:active { transform:scale(0.97); background:#92473e; }
            .qz-btn:disabled { opacity:0.6; transform:none; }
          `}</style>

          <div className="qz-root" style={styles.container}>
            <a href="/hub.html" className="qz-back">← voltar ao hub</a>
            <div className="qz-serif" style={{ fontSize: 22, fontWeight: 600, color: "#4a3634" }}>Quiz do dia</div>

            {erro && (
              <div className="qz-erro">
                ⚠️ {erro}
                <button style={{ marginLeft: 10, background: 'none', border: 'none', color: '#c0392b', fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }} onClick={() => setErro(null)}>✕</button>
              </div>
            )}

            <div className="qz-card">
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 6 }}>
                <span style={{ fontWeight: 700, color: "#4a3634" }}>💞 Sintonia do casal</span>
                <span className="qz-mono" style={{ color: "#a87fd9", fontWeight: 800 }}>{sintoniaGeral}%</span>
              </div>
              <div className="qz-bar-track">
                <div className="qz-bar-fill" style={{ width: `${sintoniaGeral}%`, background: "#a87fd9" }} />
              </div>
              <div style={{ fontSize: 11, color: "#a8938e", marginTop: 6 }}>
                {historico.filter(h => h.bateu).length} acertos em {historico.length} quizzes
              </div>
            </div>

            {!quiz && (
              <div className="qz-card" style={{ textAlign: "center", padding: 20 }}>
                <div style={{ fontSize: 13, color: "#6b5450", marginBottom: 12 }}>Nenhum quiz hoje ainda</div>
                <button className="qz-btn" onClick={criarQuiz} disabled={sincronizando}>
                  {sincronizando ? "⏳ Criando..." : "📝 Criar quiz do dia"}
                </button>
              </div>
            )}

            {quiz && (
              <div className="qz-spotlight" style={{ background: "linear-gradient(135deg, #a87fd9, #a87fd9cc)", opacity: entrou ? 1 : 0, transform: entrou ? "translateY(0)" : "translateY(10px)", transition: "opacity .5s ease .1s, transform .5s ease .1s" }}>

                {etapa === "responder" && (
                  <>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.85)", fontWeight: 800, textTransform: "uppercase", letterSpacing: 0.4 }}>Sua resposta é privada até os dois responderem</div>
                    <div className="qz-serif" style={{ color: "white", fontSize: 17, fontWeight: 600, marginTop: 8 }}>{quiz.pergunta}</div>
                    {quiz.opcoes.map(o => (
                      <button key={o.id} className="qz-opcao" type="button" onClick={handleTap(() => escolherResposta(o.id))} onTouchEnd={handleTap(() => escolherResposta(o.id))}>
                        <span style={{ fontSize: 20 }}>{o.emoji}</span>
                        <span style={{ fontSize: 13.5, fontWeight: 600 }}>{o.texto}</span>
                      </button>
                    ))}
                  </>
                )}

                {etapa === "prever" && (
                  <div style={{ animation: "fadeSlideIn .3s ease" }}>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.85)", fontWeight: 800, textTransform: "uppercase", letterSpacing: 0.4 }}>Agora tente adivinhar</div>
                    <div className="qz-serif" style={{ color: "white", fontSize: 17, fontWeight: 600, marginTop: 8 }}>O que você acha que o outro vai escolher?</div>
                    {quiz.opcoes.map(o => (
                      <button key={o.id} className="qz-opcao" type="button" onClick={handleTap(() => escolherPrevisao(o.id))} onTouchEnd={handleTap(() => escolherPrevisao(o.id))} disabled={sincronizando}>
                        <span style={{ fontSize: 20 }}>{o.emoji}</span>
                        <span style={{ fontSize: 13.5, fontWeight: 600 }}>{o.texto}</span>
                      </button>
                    ))}
                  </div>
                )}

                {etapa === "respondido" && (
                  <div style={{ textAlign: "center", padding: "10px 0", animation: "fadeSlideIn .3s ease" }}>
                    {!ambos ? (
                      <>
                        <div style={{ fontSize: 30 }}>⏳</div>
                        <div className="qz-serif" style={{ color: "white", fontSize: 15, fontWeight: 600, marginTop: 10 }}>
                          Esperando o outro responder<span className="qz-dots"><span>.</span><span>.</span><span>.</span></span>
                        </div>
                        <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 11.5, marginTop: 6 }}>Sua resposta já foi registrada</div>
                      </>
                    ) : (
                      <div style={{ animation: "fadeSlideIn .35s ease" }}>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.85)", fontWeight: 800, textTransform: "uppercase", letterSpacing: 0.4 }}>Revelado!</div>
                        <div className="qz-serif" style={{ color: "white", fontSize: 16, fontWeight: 600, marginTop: 8 }}>{quiz.pergunta}</div>
                        <div className="qz-reveal-row">
                          <div className="qz-reveal-card">
                            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.75)", fontWeight: 700 }}>{user.toUpperCase()}</div>
                            <div style={{ fontSize: 26, marginTop: 4 }}>{opcaoPorId(myAnswer)?.emoji || '❓'}</div>
                            <div style={{ fontSize: 11, color: "white", marginTop: 4 }}>{opcaoPorId(myAnswer)?.texto || '?'}</div>
                          </div>
                          <div className="qz-reveal-card">
                            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.75)", fontWeight: 700 }}>{otherUser?.toUpperCase() || '?'}</div>
                            <div style={{ fontSize: 26, marginTop: 4 }}>{opcaoPorId(otherAnswer)?.emoji || '❓'}</div>
                            <div style={{ fontSize: 11, color: "white", marginTop: 4 }}>{opcaoPorId(otherAnswer)?.texto || '?'}</div>
                          </div>
                        </div>
                        <div style={{ textAlign: "center", marginTop: 16 }}>
                          <span className="qz-match-badge" style={{ background: bateu ? "rgba(127,184,143,0.9)" : "rgba(255,255,255,0.9)", color: bateu ? "white" : "#a87fd9" }}>
                            {bateu ? "💚 Vocês pensam igual!" : "🤔 Pontos de vista diferentes"}
                          </span>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            <div className="qz-card">
              <button className="qz-toggle" onClick={() => setHistoricoExpandido(v => !v)}>
                <span>📋 Quizzes anteriores</span>
                <span className="qz-toggle-sub">{historicoExpandido ? "recolher ▲" : "ver tudo ▼"}</span>
              </button>
              <div style={{ marginTop: 10 }}>
                {(historicoExpandido ? historico : historico.slice(0, 3)).map(h => (
                  <button key={h.id} className="qz-row">
                    <span style={{ fontSize: 15 }}>{h.bateu ? "💚" : "🤔"}</span>
                    <span style={{ flex: 1, fontSize: 13, color: "#4a3634", fontWeight: 600 }}>{h.pergunta}</span>
                  </button>
                ))}
                {historico.length === 0 && <div style={{ fontSize: 12, color: "#a8938e", textAlign: "center", padding: 10 }}>Nenhum quiz respondido ainda</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const styles = {
      page: { minHeight: "100vh", background: "#faf1ee", padding: "24px 14px 60px", display: "flex", justifyContent: "center" },
      container: { width: "100%", maxWidth: 420, display: "flex", flexDirection: "column", gap: 16 },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<QuizCasalMock />);
  -->
</body>
</html>

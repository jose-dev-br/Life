<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jornada do Casal — Hub</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const APPS = [
      { id: "diario", nome: "Diario", icone: "📝", cor: "#a8544a", desc: "Cartas, quiz do dia, humor", link: "/diario/", total: 20 },
      { id: "jogos",  nome: "Jogos",  icone: "🎮", cor: "#a87fd9", desc: "Snake, Ludo, Bubble, Pokedex", link: "/jogos/",  total: 15 },
      { id: "saude",  nome: "Saude",  icone: "🏋️", cor: "#7fb88f", desc: "Peso, ciclo, academia", link: "/saude/",   total: 25 },
    ];

    function HubMock() {
      const [entrou, setEntrou] = useState(false);
      const [nomes, setNomes] = useState([]);
      const [stats, setStats] = useState(null);
      const user = sessionStorage.getItem("user") || "parceiro(a)";
      const couple = sessionStorage.getItem("couple") || "------";
      const jwt = sessionStorage.getItem("jwt") || "";

      useEffect(() => {
        const t = setTimeout(() => setEntrou(true), 60);
        async function load() {
          if (!jwt) return;
          const h = { "Authorization": "Bearer " + jwt };
          try {
            const [nu, st] = await Promise.all([
              fetch("/api/couple/users", { headers: h }).then(r => r.json()),
              fetch("/api/diary/stats", { headers: h }).then(r => r.json()),
            ]);
            if (nu.ok && nu.users) setNomes(nu.users);
            if (st.ok) setStats(st);
          } catch (e) {}
        }
        load();
        return () => clearTimeout(t);
      }, []);

      const totalConquistas = APPS.reduce((s, a) => {
        if (a.id === "diario" && stats) return s + stats.quizzes_respondidos + stats.cartas + stats.humores;
        return s;
      }, 0);
      const totalPossivel = APPS.reduce((s, a) => s + a.total, 0);

      return (
        <div style={styles.page}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,500..700&family=JetBrains+Mono:wght@500;700&display=swap');
            * { box-sizing: border-box; }
            body { margin: 0; }
            .hb-root { font-family: 'Nunito', sans-serif; }
            .hb-serif { font-family: 'Fraunces', serif; }
            .hb-mono { font-family: 'JetBrains Mono', monospace; }
            @keyframes fadeSlideIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
            @keyframes popIcon { 0%{transform:scale(.6) rotate(-8deg);opacity:0;} 60%{transform:scale(1.12) rotate(3deg);opacity:1;} 100%{transform:scale(1) rotate(0);opacity:1;} }
            @keyframes fillBar { from{width:0%;} }
            @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; } }
            .hb-card { background:#fffdfc; border-radius:20px; border:1.5px solid #f0ddd6; box-shadow:0 2px 12px rgba(180,120,110,0.07); }
            .hb-app-card { padding:18px; border-radius:22px; cursor:pointer; display:flex; align-items:center; gap:14px; text-decoration:none; animation:fadeSlideIn .4s ease both; transition:transform .15s ease; }
            .hb-app-card:active { transform:scale(0.98); }
            .hb-app-icon { width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; animation:popIcon .5s ease; }
            .hb-bar-track { background:#f5e6e1; border-radius:999px; overflow:hidden; }
            .hb-bar-fill { height:100%; border-radius:999px; animation:fillBar .9s cubic-bezier(.2,.8,.2,1); }
            .hb-arrow { font-size:18px; color:#c2aca4; }
            .hb-footer { text-align:center; padding:14px; }
            .hb-logout { font-size:12px; color:#a8938e; font-weight:700; cursor:pointer; text-decoration:underline; }
          `}</style>
          <div className="hb-root" style={styles.container}>
            <div style={{ textAlign: "center", marginTop: 10 }}>
              <div className="hb-serif" style={{ fontSize: 24, fontWeight: 600, color: "#4a3634" }}>Jornada do Casal</div>
              <div style={{ fontSize: 12.5, color: "#a8938e", marginTop: 4 }}>
                {nomes.length >= 2 ? nomes.join(" & ") : user + " & parceiro(a)"} · casal {couple}
              </div>
            </div>

            <div className="hb-card" style={{ padding: 16, textAlign: "center", opacity: entrou ? 1 : 0, transition: "opacity .4s ease" }}>
              <div className="hb-mono" style={{ fontSize: 20, fontWeight: 800, color: "#4a3634" }}>{totalConquistas}/{totalPossivel}</div>
              <div style={{ fontSize: 10.5, color: "#a8938e", fontWeight: 700, textTransform: "uppercase" }}>atividades no ecossistema todo</div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {APPS.map((app, idx) => {
                const atual = app.id === "diario" && stats
                  ? stats.quizzes_respondidos + stats.cartas + stats.humores
                  : 0;
                const pct = Math.round((atual / app.total) * 100);
                const label = app.id === "diario" && stats
                  ? `${stats.quizzes_respondidos} quizzes · ${stats.cartas} cartas · ${stats.humores} humores`
                  : "ainda sem dados";
                return (
                  <a key={app.id} href={app.link} className="hb-card hb-app-card" style={{ animationDelay: entrou ? `${idx * 0.08}s` : "0s", opacity: entrou ? undefined : 0 }}>
                    <div className="hb-app-icon" style={{ background: app.cor + "22" }}>{app.icone}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                        <div className="hb-serif" style={{ fontSize: 17, fontWeight: 600, color: "#4a3634" }}>{app.nome}</div>
                        {stats && app.id === "diario" && <span style={{ fontSize: 11, fontWeight: 700, color: app.cor }}>💞 {stats.sintonia}%</span>}
                      </div>
                      <div style={{ fontSize: 11.5, color: "#a8938e", marginTop: 1 }}>{app.desc}</div>
                      <div style={{ marginTop: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#8a6f6a", marginBottom: 3 }}>
                          <span>🎖️ atividades</span>
                          <span className="hb-mono">{atual}/{app.total}</span>
                        </div>
                        <div className="hb-bar-track" style={{ height: 6 }}>
                          <div className="hb-bar-fill" style={{ width: `${pct}%`, background: app.cor }} />
                        </div>
                      </div>
                      <div style={{ fontSize: 10.5, color: "#c2aca4", marginTop: 6, fontStyle: "italic" }}>{label}</div>
                    </div>
                    <span className="hb-arrow">›</span>
                  </a>
                );
              })}
            </div>

            <div className="hb-footer">
              <div style={{ fontSize: 10.5, color: "#c2aca4", marginBottom: 8 }}>cada app guarda sua propria linha de atividades — o total acima e so informativo</div>
              <a href="/" className="hb-logout" onClick={() => { sessionStorage.clear(); }}>sair da conta</a>
            </div>
          </div>
        </div>
      );
    }

    const styles = {
      page: { minHeight: "100vh", background: "#faf1ee", padding: "24px 14px 40px", display: "flex", justifyContent: "center" },
      container: { width: "100%", maxWidth: 420, display: "flex", flexDirection: "column", gap: 16 },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<HubMock />);
  </script>
</body>
</html>

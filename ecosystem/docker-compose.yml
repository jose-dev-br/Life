services:
  # ☁️ Servidor central — o mesmo server.py de sempre, dono do banco (SQLite)
  # e da autenticação. Nenhum frontend fala com ele fora da rede interna do
  # compose; só o proxy é exposto pra fora.
  servidor-central:
    build: ./servidor-central
    volumes:
      - dados_app:/app/data   # SQLite mora aqui — 1 arquivo, backup = copiar a pasta
    expose:
      - "8000"
    restart: unless-stopped

  # 🏠 App Central — login, hub, perfil
  app-central:
    build: ./app-central
    expose:
      - "80"
    restart: unless-stopped

  # 📝 App Diário — cartas, quiz do dia, humor
  app-diario:
    build: ./app-diario
    expose:
      - "80"
    restart: unless-stopped

  # 🎮 App Jogos — conquistas, Snake, Ludo, Bubble, Pokédex
  app-jogos:
    build: ./app-jogos
    expose:
      - "80"
    restart: unless-stopped

  # 🏋️ App Saúde — peso, ciclo, academia
  app-saude:
    build: ./app-saude
    expose:
      - "80"
    restart: unless-stopped

  # 🌐 Proxy — única porta exposta pra fora. É nela que o ngrok aponta.
  proxy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - servidor-central
      - app-central
      - app-diario
      - app-jogos
      - app-saude
    restart: unless-stopped

volumes:
  dados_app:

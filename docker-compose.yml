services:
  servidor-central:
    build: ./ecosystem/servidor-central
    volumes:
      - dados_app:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  app-central:
    build: ./ecosystem/app-central
    expose:
      - "80"
    restart: unless-stopped

  app-diario:
    build: ./ecosystem/app-diario
    expose:
      - "80"
    restart: unless-stopped

  app-uber:
    build: ./ecosystem/app-uber
    expose:
      - "80"
    restart: unless-stopped

  app-jogos:
    build: ./ecosystem/app-jogos
    expose:
      - "80"
    restart: unless-stopped

  app-saude:
    build: ./ecosystem/app-saude
    expose:
      - "80"
    restart: unless-stopped

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./syncthing/config:/config
      - ./syncthing/retroarch_saves:/saves
    expose:
      - "8384"
      - "22000/tcp"
      - "22000/udp"
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./ecosystem/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - servidor-central
      - app-central
      - app-diario
      - app-uber
      - app-jogos
      - app-saude
      - syncthing
    restart: unless-stopped

volumes:
  dados_app:
